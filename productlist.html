<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statisk Side</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Link til CSS-stylesheet -->
    <link rel="stylesheet" href="style.css">
    <script src="js/productlist.js" defer></script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="Logo_Fav/favicon(1).webp">
</head>

<body>
    <main>
        <h1>Products</h1>


        <h2 class="Productlisth2">${product.season}</h2>

        <div class="FlexGrid">
            <div class="SortPriceBtnContainer">
                <button class="SortByPrice">Sortér Pris (lavest til højest) </button>
            </div>


            <div class="SortPriceBtnContainer">
                <button class="SortByPrice   filterbtn">Filtrér til Kvinder </button>
            </div>

            <div class="SortPriceBtnContainer">
                <button class="SortByPrice   ShowAllProducts">Fjern Filter </button>
            </div>
        </div>

        <div class="container">

            <div class="product-gallery">



            </div>
        </div>




    </main>


</body>

</html>
